services:
  - type: web
    name: dance-studio-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm run start
    plan: free
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: PORT
        value: 3000
      - key: SQLITE_PATH
        value: ./data/app.db
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: CORS_ORIGIN
        sync: false
