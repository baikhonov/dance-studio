services:
  postgres:
    image: postgres:17-alpine
    container_name: dance-studio-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: dance_studio
      POSTGRES_USER: dance
      POSTGRES_PASSWORD: dance_password
    ports:
      - '5432:5432'
    volumes:
      - pg_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./server
    container_name: dance-studio-backend
    depends_on:
      - postgres
    restart: unless-stopped
    environment:
      PORT: 3000
      CORS_ORIGIN: http://localhost:5173,http://localhost:8080
      JWT_SECRET: local-dev-secret
      ADMIN_PASSWORD: 123456
      JWT_EXPIRES_IN: 7d
      DATABASE_URL: postgres://dance:dance_password@postgres:5432/dance_studio
    ports:
      - '3000:3000'
    command: sh -c "npm run db:migrate && npm run start"
    volumes:
      - backend_uploads:/app/uploads

volumes:
  pg_data:
  backend_uploads:
